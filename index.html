<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiastoX - NeoCity X</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link href="/tailwind.css" rel="stylesheet">
</head>
<body class="bg-[#0a0a0a] text-[#e0e0e0] font-sans">

  <!-- Neon navbar -->
  <nav class="fixed top-0 left-0 right-0 bg-[#16161e] p-4 border-b border-[#00f5ff22]">
    <div class="container mx-auto flex justify-between items-center">
      <div class="text-2xl font-bold text-[#00f5ff]">MiastoX</div>
      <div class="space-x-4">
        <a href="#" class="px-4 py-2 rounded-full bg-[#00f5ff] text-black font-bold hover:scale-105 transition duration-300">GRAJ NA ROBLOX</a>
        <a href="/map-3d" class="px-4 py-2 rounded-full border-2 border-[#00f5ff] text-[#00f5ff] hover:bg-[#00f5ff] hover:text-black transition duration-300">EXPLORE 3D MAP</a>
      </div>
    </div>
  </nav>

  <!-- Hero section -->
  <section class="h-screen flex items-center justify-center text-center px-8">
    <div class="backdrop-blur-lg bg-[#16161e]/80 p-8 rounded-lg">
      <h1 class="text-6xl font-bold text-[#00f5ff] mb-4">MiastoX</h1>
      <p class="text-xl text-[#aaaaaa] mb-8">CLIMB TO THE TOP</p>
      <div class="text-sm text-[#aaaaaa] mb-8">30+ pięter • 16 typów platform • 7 trybów • ∞ możliwości</div>
    </div>
  </section>

  <!-- Stats grid -->
  <section class="py-16">
    <div class="container mx-auto grid grid-cols-1 md:grid-cols-4 gap-6">
      <div class="bg-[#16161e] p-6 rounded-lg border border-[#00f5ff22] hover:glow-neon-cyan">
        <h3 class="text-xl font-bold text-[#00f5ff] mb-2">Graczy online</h3>
        <p class="text-3xl text-[#e0e0e0]">Live counter</p>
      </div>
      <!-- More stats cards -->
    </div>
  </section>

  <!-- 3D Map section -->
  <section class="py-16">
    <div class="container mx-auto">
      <div class="aspect-w-16 aspect-h-9">
        <iframe src="/map-3d" class="w-full h-96 rounded-lg overflow-hidden"></iframe>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-[#16161e] p-8">
    <div class="container mx-auto text-center">
      <p class="text-sm text-[#aaaaaa]">© 2024 MiastoX. Built with ❤️ using NeoCity X Design System.</p>
    </div>
  </footer>

  <script src="/script.js"></script>
</body>
</html>
