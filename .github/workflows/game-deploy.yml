name: Build & Deploy Game

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "Packages/**"
      - "default.project.json"
      - "test.project.json"
      - "wally.toml"
      - ".darklua.json"
      - ".lune/**"
      - "aftman.toml"
  workflow_dispatch:

env:
  RBXL_FILE: MiastoX.rbxl
  PLACE_ID: ${{ vars.PLACE_ID }}
  UNIVERSE_ID: ${{ vars.GAME_ID }}

jobs:
  analyze:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Aftman
        uses: ok-nick/setup-aftman@v0.4.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Wally Packages
        uses: actions/cache@v4
        with:
          path: Packages/
          key: ${{ runner.os }}-wally-${{ hashFiles('wally.toml') }}

      - name: Install Wally Packages
        run: wally install

      - name: Generate Sourcemap
        run: rojo sourcemap test.project.json -o sourcemap.json

      - name: Export Wally Package Types
        run: wally-package-types --sourcemap sourcemap.json Packages

      - name: Generate Global Luau Types
        run: curl -L "https://raw.githubusercontent.com/JohnnyMorganz/luau-lsp/main/scripts/globalTypes.d.lua" > globalTypes.d.lua

      - name: Luau LSP Analysis
        run: luau-lsp analyze --sourcemap sourcemap.json --definitions globalTypes.d.lua src tests

      - name: Extract Version
        id: version
        shell: bash
        run: |
          version=$(grep -oP '(?<=^version = ")[^"]+' wally.toml || echo "0.0.0")
          echo "version=$version" >> $GITHUB_OUTPUT

  build:
    needs: analyze
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Aftman
        uses: ok-nick/setup-aftman@v0.4.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore Wally Packages (cached)
        run: wally install

      - name: Build Game Place
        run: rojo build test.project.json -o ${{ env.RBXL_FILE }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-build
          path: ${{ env.RBXL_FILE }}
          retention-days: 7

  deploy:
    needs: [analyze, build]
    runs-on: windows-latest
    environment:
      name: roblox-production
      url: https://www.roblox.com/games/${{ env.PLACE_ID }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: game-build

      - name: Deploy to Roblox via rbxcloud
        shell: pwsh
        run: |
          rbxcloud.exe experience publish `
            --filename ${{ env.RBXL_FILE }} `
            --place-id ${{ env.PLACE_ID }} `
            --universe-id ${{ env.UNIVERSE_ID }} `
            --version-type published `
            --api-key ${{ secrets.DEPLOY_API_KEY }}

      - name: Create Deployment Report
        shell: pwsh
        run: |
          $report = @"
          ## Deployment Report
          - **Version:** ${{ needs.analyze.outputs.version }}
          - **Commit:** ${{ github.sha }}
          - **Branch:** ${{ github.ref_name }}
          - **Deployed to:** https://www.roblox.com/games/${{ env.PLACE_ID }}
          - **Time:** $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC')
          "@
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $report
