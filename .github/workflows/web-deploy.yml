name: Deploy Website

on:
  push:
    branches: ["web"]
    paths:
      - "*.html"
      - "*.md"
      - "*.yml"
      - "*.css"
      - "_layouts/**"
      - "styles/**"
      - "collections/**"
      - "translations/**"
      - "gh-assets/**"
      - "Gemfile"
      - "_config.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
