name: Deploy Website

on:
  push:
    branches: ["web"]
    paths:
      - "*.html"
      - "*.md"
      - "*.yml"
      - "*.css"
      - "_layouts/**"
      - "styles/**"
      - "collections/**"
      - "translations/**"
      - "gh-assets/**"
      - "Gemfile"
      - "_config.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    steps:
      - uses: actions/checkout@v4
      - name: Send Discord Changelog Notification
        run: |
          COMMIT_MSG="$(git log -1 --pretty=%B | head -1)"
          COMMIT_AUTHOR="$(git log -1 --pretty=%an)"
          COMMIT_SHA="$(git log -1 --pretty=%h)"
          DEPLOY_URL="https://Dawju9.github.io/MiastoX"

          PAYLOAD=$(jq -n \
            --arg title "🚀 Deployed to GitHub Pages" \
            --arg desc "**Version:** ${COMMIT_SHA}\n**Author:** ${COMMIT_AUTHOR}\n**Commit:** ${COMMIT_MSG}" \
            --arg url "$DEPLOY_URL" \
            '{
              username: "MiastoX CI",
              embeds: [{
                title: $title,
                description: $desc,
                url: $url,
                color: 3066993,
                footer: { text: "MiastoX Web Deploy" },
                timestamp: (now | strftime("%Y-%m-%dT%H:%M:%S.000Z"))
              }]
            }')

          curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$CHANGELOG_WEBHOOK"

      - name: Send Discord Announcement
        run: |
          COMMIT_MSG="$(git log -1 --pretty=%B | head -1)"
          DEPLOY_URL="https://Dawju9.github.io/MiastoX"

          PAYLOAD=$(jq -n \
            --arg title "📢 MiastoX Website Updated" \
            --arg desc "New changes have been deployed!\n\n**Latest:** ${COMMIT_MSG}" \
            --arg url "$DEPLOY_URL" \
            '{
              username: "MiastoX Bot",
              embeds: [{
                title: $title,
                description: $desc,
                url: $url,
                color: 3447003,
                footer: { text: "MiastoX Announcements" },
                timestamp: (now | strftime("%Y-%m-%dT%H:%M:%S.000Z"))
              }]
            }')

          curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$OGLOSZENIA_WEBHOOK"
    env:
      CHANGELOG_WEBHOOK: ${{ secrets.DISCORD_CHANGELOG_WEBHOOK }}
      OGLOSZENIA_WEBHOOK: ${{ secrets.DISCORD_ANNOUNCEMENTS_WEBHOOK }}
