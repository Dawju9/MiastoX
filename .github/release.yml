name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., v1.0.0)'
        required: true
        type: string

env:
  RBXL_FILE: MiastoX.rbxl
  PLACE_ID: ${{ vars.PLACE_ID }}
  UNIVERSE_ID: ${{ vars.GAME_ID }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Aftman
        uses: ok-nick/setup-aftman@v0.4.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Wally
        run: wally install

      - name: Run Selene
        continue-on-error: true
        run: selene src --config selene.toml

      - name: Check StyLua
        continue-on-error: true
        run: stylua src --check --config stylua.toml

  build:
    name: Build
    needs: lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Aftman
        uses: ok-nick/setup-aftman@v0.4.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Wally
        run: wally install

      - name: Generate Sourcemap
        run: rojo sourcemap test.project.json -o sourcemap.json

      - name: Export Wally Types
        run: wally-package-types --sourcemap sourcemap.json Packages

      - name: Build Game Place
        run: rojo build test.project.json -o ${{ env.RBXL_FILE }}

  release:
    name: Release
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: game-build-${{ github.sha }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          generate_release_notes: true
          files: ${{ env.RBXL_FILE }}

      - name: Deploy to Roblox
        shell: pwsh
        run: |
          rbxcloud.exe experience publish `
            --filename ${{ env.RBXL_FILE }} `
            --place-id ${{ env.PLACE_ID }} `
            --universe-id ${{ env.UNIVERSE_ID }} `
            --version-type published `
            --api-key ${{ secrets.DEPLOY_API_KEY }}
