# Welcome Configuration - MiastoX Web (Strona WWW)

# Nazwa projektu
PROJECT_NAME="MiastoX Web"
PROJECT_SHORT="miastox-web"

# Opis projektu
PROJECT_DESC="Strona internetowa gry MiastoX - Jekyll site"

# Wersja
VERSION="1.0.0"
VERSION_DATE="2026-04-12"

# Repozytorium GitHub
GITHUB_REPO="Dawju9/MiastoX"
GITHUB_BRANCH="web"

# Tech stack
TECH_STACK=("Jekyll" "Ruby" "HTML" "CSS" "JavaScript")

# Kolory
COLOR_TITLE="36"
COLOR_OK="32"
COLOR_WARN="33"
COLOR_ERR="31"
COLOR_INFO="34"

# Pliki do pominięcia
EXCLUDE_DIRS=("node_modules" ".git" "target" "_site" ".vscode" ".github" "_layouts" "assets" "collections")
EXCLUDE_FILES=("*.lock" "*.exe")

# Funkcje do wyświetlenia
SHOW_GIT=1
SHOW_SIZE=1
SHOW_FILES=1
SHOW_CONFIG=1
SHOW_ERRORS=0

# GitHub Pages
GITHUB_PAGES="https://dawju9.github.io/MiastoX"

# Wiadomość powitalna
WELCOME_MESSAGE="
🏙️ {PROJECT_NAME} - {VERSION}
{PROJECT_DESC}

📂 Lokalizacja: {DIR}
🌐 GitHub: https://github.com/{GITHUB_REPO}/tree/{GITHUB_BRANCH}
🌐 Strona: {GITHUB_PAGES}

Użyj 'gh-help' dla komend GitHub
"

# Komendy dostępne w projekcie
CUSTOM_COMMANDS=(
    "gh-push web:Push do GitHub branch web"
    "gh-log web:Historia commitów"
    "bundle exec jekyll serve:Uruchom lokalny serwer Jekyll"
    "bundle exec jekyll build:Build strony"
    "echo Sprawdź stronę: https://dawju9.github.io/MiastoX"
)