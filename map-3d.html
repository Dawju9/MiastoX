<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MiastoX — Mapa 3D</title>
<meta name="description" content="Interaktywna mapa 3D gry MiastoX na Roblox. Podgląd pięter, platform i graczy.">
<meta name="theme-color" content="#0a0a0a">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;900&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
  --accent: #d4d4d4;
  --bg-dark: #0a0a0a;
  --bg-panel: #121212;
  --text: #e0e0e0;
  --text-dim: #aaaaaa;
  --nav-height: 56px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg-dark);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
}

/* ---- Minimal nav for map page ---- */
.map-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: var(--nav-height);
  display: flex; align-items: center; padding: 0 16px;
  background: rgba(15,15,35,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  gap: 12px;
}
.map-nav a {
  color: var(--text); text-decoration: none;
  font-family: 'Big Shoulders Display', sans-serif;
  font-weight: 700; font-size: 1.1rem;
  display: flex; align-items: center; gap: 6px;
}
.map-nav a:hover { color: var(--accent); }
.map-nav .nav-spacer { flex: 1; }
.map-nav .nav-back {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.8rem; color: var(--text-dim);
  padding: 6px 12px; border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.1);
}
.map-nav .nav-back:hover { border-color: #d4d4d4; color: var(--text); }

.map-container {
  display: flex;
  height: 100vh;
  gap: 0;
}

.map-sidebar {
  width: 300px;
  min-width: 300px;
  background: var(--bg-panel);
  padding: 20px;
  overflow-y: auto;
  border-right: 1px solid rgba(255,255,255,0.1);
  z-index: 10;
}

.sidebar-title {
  font-family: 'Big Shoulders Display', sans-serif;
  font-size: 1.6em;
  margin-bottom: 15px;
  color: var(--accent);
  text-transform: uppercase;
}

.connection-status {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 15px;
  background: rgba(255,255,255,0.05);
}

.status-dot {
    width: 10px;
   height: 10px;
   border-radius: 50%;
   background: var(--text-dim);
   animation: pulse 1.5s infinite;
 
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

.stat-box {
  background: rgba(255,255,255,0.05);
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 10px;
}

.stat-label {
  font-size: 0.8em;
  color: var(--text-dim);
}

.stat-value {
  font-size: 1.5em;
  font-weight: bold;
}

.floor-section, .legend-section, .players-section {
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.1);
}

.section-title {
  font-size: 0.9em;
  color: var(--text-dim);
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.floor-list {
  max-height: 250px;
  overflow-y: auto;
}

.floor-item {
  padding: 8px 12px;
  margin: 4px 0;
  background: rgba(255,255,255,0.05);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.85em;
}

.floor-item:hover {
  background: rgba(233, 69, 96, 0.15);
}

.floor-item.active {
  background: var(--accent);
}

.floor-type {
  font-size: 0.7em;
  padding: 2px 6px;
  border-radius: 4px;
  background: rgba(255,255,255,0.1);
}

.view-btn {
  font-size: 0.7em;
  padding: 2px 8px;
  border: none;
  border-radius: 4px;
  background: rgba(255,255,255,0.15);
  color: white;
  cursor: pointer;
  transition: all 0.2s;
}

.view-btn:hover {
  background: var(--accent);
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 4px 0;
  font-size: 0.8em;
}

.legend-color {
  width: 14px;
  height: 14px;
  border-radius: 3px;
}

.player-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 8px;
  background: rgba(255,255,255,0.05);
  border-radius: 6px;
  margin: 4px 0;
  font-size: 0.85em;
}

.player-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

#canvas-container {
  flex: 1;
  position: relative;
  overflow: hidden;
}

#info-overlay {
  position: absolute;
  bottom: 20px;
  left: 20px;
  background: rgba(0,0,0,0.7);
  padding: 10px 16px;
  border-radius: 8px;
  font-size: 0.85em;
  pointer-events: none;
}

.controls-overlay {
  position: absolute;
  top: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.ctrl-btn {
  width: 40px;
  height: 40px;
  border-radius: 8px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
  font-size: 1.2em;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.ctrl-btn:hover {
  background: var(--accent);
}

.ctrl-btn.active {
  background: var(--accent);
}

.floor-search {
  width:100%;padding:8px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);
background:rgba(255,255,255,0.05);color:var(--text-heading);font-size:13px;margin-bottom:8px;outline:none;
}
.floor-search:focus {
  border-color: var(--accent);
  background: rgba(233,69,96,0.1);
}

#tooltip-3d {
  position:fixed;pointer-events:none;z-index:100;
  background:rgba(0,0,0,0.92);padding:10px 14px;border-radius:8px;
  border:1px solid var(--accent);font-size:13px;display:none;
color:var(--text-heading);max-width:240px;backdrop-filter:blur(8px);
}

.kbd-hint {
  position:absolute;bottom:20px;right:20px;
  font-size:11px;color:rgba(255,255,255,0.3);
  text-align:right;line-height:1.6;
}

.loading-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 15px;
  z-index: 20;
}

.spinner {
  width: 50px;
  height: 50px;
  border: 4px solid rgba(255,255,255,0.1);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.floor-list::-webkit-scrollbar, .map-sidebar::-webkit-scrollbar {
  width: 6px;
}
.floor-list::-webkit-scrollbar-track, .map-sidebar::-webkit-scrollbar-track {
  background: transparent;
}
.floor-list::-webkit-scrollbar-thumb, .map-sidebar::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.15);
  border-radius: 3px;
}

@media (max-width: 768px) {
  .map-sidebar {
    width: 100%;
    min-width: 100%;
    max-height: 40vh;
    border-right: none;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .map-container {
    flex-direction: column;
  }
}
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

const PlatformColors = {
   basic: '#d4d4d4', platform: '#d4d4d4',
   moving: '#b0b0b0', rotating: '#888888',
   spiral: '#555555', checkpoint: '#d4d4d4',
   elevator: '#d4d4d4', special: '#b0b0b0',
   boost: '#b0b0b0', bounce: '#888888',
   spike: '#555555', ice: '#d4d4d4',
   crumbling: '#b0b0b0', disappearing: '#888888',
   teleporter: '#555555', laser: '#d4d4d4', enemy: '#b0b0b0'
};

const LevelTypes = {
   normal: { name: 'Normal', color: '#d4d4d4' },
   infinite: { name: 'Infinite Spiral', color: '#b0b0b0' },
   paradox: { name: 'Paradox', color: '#888888' },
   time_loop: { name: 'Time Loop', color: '#555555' },
   mirror: { name: 'Mirror', color: '#444444' },
   void: { name: 'The Void', color: '#333333' },
   disaster: { name: 'Disaster', color: '#222222' }
};

const floorSpacing = 5;

// ---- SCENE SETUP ----
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x070714);
scene.fog = new THREE.Fog(0x070714, 80, 200);

const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 200);
camera.position.set(32, 28, 32);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
container.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(container.clientWidth, container.clientHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.left = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
container.appendChild(labelRenderer.domElement);

// ---- POST-PROCESSING ----
const composer = new EffectComposer(renderer);
const renderPass = new RenderPass(scene, camera);
composer.addPass(renderPass);

const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(container.clientWidth, container.clientHeight),
  0.3, 0.2, 0.1
);
composer.addPass(bloomPass);

const outputPass = new OutputPass();
composer.addPass(outputPass);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
    controls.minDistance = 15;
    controls.maxDistance = 150;
controls.maxPolarAngle = Math.PI / 2.05;
controls.target.set(0, 70, 0);

// ---- LIGHTS ----
const ambientLight = new THREE.AmbientLight(0x334466, 0.5);
scene.add(ambientLight);

const mainLight = new THREE.DirectionalLight(0xffeedd, 2.5);
mainLight.position.set(25, 50, 25);
mainLight.castShadow = true;
mainLight.shadow.mapSize.width = 2048;
mainLight.shadow.mapSize.height = 2048;
scene.add(mainLight);

const fillLight = new THREE.DirectionalLight(0x4488ff, 0.6);
fillLight.position.set(-25, 15, -25);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xff66aa, 0.4);
rimLight.position.set(0, -15, 40);
scene.add(rimLight);

const hemiLight = new THREE.HemisphereLight(0x4488ff, 0x001133, 0.5);
scene.add(hemiLight);

// ---- CITY SKYLINE ----
function createSkyline() {
  const group = new THREE.Group();
  const bColors = [0x1a1a3e, 0x222244, 0x2a2a4e, 0x1e1e3a, 0x262648, 0x162038, 0x2e1e3e, 0x1e2844];
  const wMat = new THREE.MeshBasicMaterial({ color: 0xffdd88, transparent: true, opacity: 0.35 });

  for (let ring = 0; ring < 2; ring++) {
    const count = ring === 0 ? 16 : 24;
    const dist = ring === 0 ? 12 : 18;
    for (let i = 0; i < count; i++) {
      const a = (i / count) * Math.PI * 2 + ring * 0.5;
      const h = 2 + Math.random() * (ring === 0 ? 5 : 12);
      const w = 0.8 + Math.random() * 1.2;
      const d = 0.8 + Math.random() * 1.2;
      const c = bColors[(i + ring * 3) % bColors.length];
      const mat = new THREE.MeshStandardMaterial({ color: c, roughness: 0.6, metalness: 0.3, emissive: c, emissiveIntensity: 0.04 });
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
      const x = Math.cos(a) * (dist + Math.random() * 2);
      const z = Math.sin(a) * (dist + Math.random() * 2);
      mesh.position.set(x, h / 2 - 1.5, z);
      mesh.castShadow = true;
      group.add(mesh);
      const wc = Math.floor(h * 1.5);
      for (let wi = 0; wi < wc; wi++) {
        const wy = -h / 2 + 0.4 + wi * 0.7;
        const win = new THREE.Mesh(new THREE.PlaneGeometry(0.25, 0.3), wMat);
        win.position.set(Math.sign(x) * w / 2.05, wy, z);
        if (Math.abs(x) < 0.3) win.position.set(x, wy, Math.sign(z) * d / 2.05);
        group.add(win);
      }
    }
  }
  return group;
}
scene.add(createSkyline());

// ---- GROUND ----
const groundGeom = new THREE.PlaneGeometry(100, 100);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x060612, roughness: 0.9, metalness: 0.0
});
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -2.5;
ground.receiveShadow = true;
scene.add(ground);

const gridHelper = new THREE.GridHelper(100, 50, 0x1a1a3e, 0x111128);
gridHelper.position.y = -2.4;
scene.add(gridHelper);

// ---- MIASTOX TITLE ----
function createTitle() {
  const div = document.createElement('div');
  div.textContent = 'MIASTOX';
  div.style.fontFamily = "'Big Shoulders Display', sans-serif";
  div.style.fontSize = '52px';
  div.style.fontWeight = '700';
  div.style.color = '#d4d4d4';
  div.style.textShadow = '0 0 30px #d4d4d4, 0 0 60px #d4d4d444, 0 0 120px #d4d4d422';
  div.style.letterSpacing = '12px';
  div.style.background = 'linear-gradient(180deg, rgba(233,69,96,0.12) 0%, transparent 100%)';
  div.style.padding = '12px 50px';
  div.style.borderRadius = '12px';
  div.style.border = '1px solid rgba(233,69,96,0.25)';
  div.style.backdropFilter = 'blur(4px)';
  return new CSS2DObject(div);
}
const titleLabel = createTitle();
titleLabel.position.set(0, 160, 0);
scene.add(titleLabel);

function createSubtitle() {
  const div = document.createElement('div');
  div.textContent = 'CLIMB TO THE TOP';
  div.style.fontFamily = "'IBM Plex Sans', sans-serif";
  div.style.fontSize = '14px';
  div.style.fontWeight = '300';
  div.style.color = '#aaaaaa';
  div.style.textShadow = '0 0 20px rgba(0,0,0,0.8)';
  div.style.letterSpacing = '6px';
  div.style.background = 'rgba(0,0,0,0.4)';
  div.style.padding = '6px 20px';
  div.style.borderRadius = '6px';
  div.style.border = '1px solid rgba(255,255,255,0.05)';
  return new CSS2DObject(div);
}
const subtitleLabel = createSubtitle();
subtitleLabel.position.set(0, 155, 0);
scene.add(subtitleLabel);

// ---- PARTICLES ----
const particleCount = 400;
const particleGeom = new THREE.BufferGeometry();
const particlePos = new Float32Array(particleCount * 3);
const particleSizes = new Float32Array(particleCount);
for (let i = 0; i < particleCount; i++) {
  particlePos[i * 3] = (Math.random() - 0.5) * 80;
  particlePos[i * 3 + 1] = Math.random() * 175 - 5;
  particlePos[i * 3 + 2] = (Math.random() - 0.5) * 80;
  particleSizes[i] = 0.02 + Math.random() * 0.05;
}
particleGeom.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
particleGeom.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));
const particleMat = new THREE.PointsMaterial({
  color: 0x4488ff, size: 0.06, transparent: true, opacity: 0.3,
  blending: THREE.AdditiveBlending
});
const particles = new THREE.Points(particleGeom, particleMat);
scene.add(particles);

// ---- RAYCASTER & INTERACTION ----
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let hoveredMesh = null;
let hoveredPlatform = null;
let platformMeshes = [];
const originalColors = new Map();

const tooltip = document.createElement('div');
tooltip.id = 'tooltip-3d';
tooltip.style.cssText = 'position:fixed;pointer-events:none;z-index:100;background:rgba(0,0,0,0.92);padding:10px 14px;border-radius:8px;border:1px solid var(--accent);font-size:13px;display:none;color:#fff;max-width:240px;backdrop-filter:blur(8px);';
container.appendChild(tooltip);

renderer.domElement.addEventListener('pointermove', (e) => {
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
});

renderer.domElement.addEventListener('pointerdown', (e) => {
  if (!hoveredMesh || !hoveredPlatform) return;
  const y = (hoveredPlatform.floor - 1) * floorSpacing + 2;
  camera.position.set(hoveredMesh.position.x, y + 3, hoveredMesh.position.z + 5);
  controls.target.set(hoveredMesh.position.x, y, hoveredMesh.position.z);
  focusFloor(hoveredPlatform.floor);
});

function updateHover() {
  raycaster.setFromCamera(pointer, camera);
  const intersects = raycaster.intersectObjects(platformMeshes);
  if (hoveredMesh && (!intersects.length || intersects[0].object !== hoveredMesh)) {
    if (originalColors.has(hoveredMesh)) {
      hoveredMesh.material.emissiveIntensity = hoveredMesh.userData.baseIntensity || 0.2;
    }
    hoveredMesh = null;
    hoveredPlatform = null;
    tooltip.style.display = 'none';
  }
  if (intersects.length > 0) {
    const obj = intersects[0].object;
    if (obj.userData && obj.userData.platform) {
      hoveredMesh = obj;
      hoveredPlatform = obj.userData.platform;
      if (!originalColors.has(obj)) {
        originalColors.set(obj, obj.material.emissiveIntensity);
      }
      obj.material.emissiveIntensity = 0.8;
      const p = hoveredPlatform;
      tooltip.innerHTML = `<b style="color:${PlatformColors[p.type]||'#fff'}">${p.type.toUpperCase()}</b> — Floor ${p.floor}<br>Position: ${p.x.toFixed(1)}, ${p.z.toFixed(1)}`;
      const tx = intersects[0].point.project(camera);
      const mx = (tx.x * 0.5 + 0.5) * renderer.domElement.clientWidth;
      const my = (-tx.y * 0.5 + 0.5) * renderer.domElement.clientHeight;
      tooltip.style.left = Math.min(mx + 15, window.innerWidth - 240) + 'px';
      tooltip.style.top = Math.min(my + 15, window.innerHeight - 100) + 'px';
      tooltip.style.display = 'block';
    }
  }
}

// ---- KEYBOARD SHORTCUTS ----
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowUp' || e.key === 'ArrowRight') {
    const next = Math.min(currentViewFloor + 1, Object.keys(floors).length);
    focusFloor(next);
  }
  if (e.key === 'ArrowDown' || e.key === 'ArrowLeft') {
    const prev = Math.max(currentViewFloor - 1, 1);
    focusFloor(prev);
  }
  if (e.key === 'r' || e.key === 'R') {
    autoRotate = false;
    camera.position.set(25, 20, 30);
    controls.target.set(0, 15, 0);
    controls.update();
  }
  if (e.key === ' ') {
    e.preventDefault();
    document.getElementById('toggleRotate').click();
  }
  if (e.key === '+' || e.key === '=') {
    const d = camera.position.distanceTo(controls.target);
    camera.position.lerp(controls.target, 0.1);
  }
});

// ---- FLOOR DATA ----
const floors = {};
const players = {};
let floorMeshes = [];
let playerMeshes = [];
let currentViewFloor = 1;

function getLevelType(floor) {
  if (floor % 100 === 0) return 'void';
  if (floor % 75 === 0) return 'paradox';
  if (floor % 50 === 0) return 'time_loop';
  if (floor % 33 === 0) return 'mirror';
  if (floor >= 15 && floor % 10 === 0) return 'infinite';
  if (floor >= 50 && floor % 10 === 0) return 'disaster';
  return 'normal';
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16) / 255;
  const g = parseInt(hex.slice(3, 5), 16) / 255;
  const b = parseInt(hex.slice(5, 7), 16) / 255;
  return { r, g, b };
}

function generatePlatforms(floorNum, levelType) {
  const platforms = [];
  const HS = 5;
  const rng = (s, e) => s + Math.random() * (e - s);
  const pick = a => a[Math.floor(Math.random() * a.length)];

  const types = levelType === 'infinite' ? ['spiral', 'moving'] :
    levelType === 'paradox' ? ['checkpoint', 'teleporter'] :
    levelType === 'mirror' ? ['basic', 'ice'] :
    levelType === 'void' ? ['basic', 'spike'] :
    ['basic', 'platform', 'moving', 'rotating', 'spiral', 'checkpoint', 'boost', 'bounce', 'spike'];

  const gridPositions = [];
  const seed = floorNum * 7;
  for (let i = 0; i < 12; i++) {
    const angle = seed + i * 2.1;
    const dist = rng(1.5, 4.5);
    gridPositions.push({
      x: Math.cos(angle) * dist,
      z: Math.sin(angle) * dist,
      rot: angle
    });
  }
  if (levelType === 'infinite') {
    for (let i = 0; i < 4; i++) {
      const a = i * 1.57 + seed * 0.1;
      gridPositions.push({
        x: Math.cos(a) * rng(5, 6.5),
        z: Math.sin(a) * rng(5, 6.5),
        rot: a
      });
    }
  }

  const count = levelType === 'void' ? 4 : 6;
  const selected = gridPositions.slice(0, count);

  selected.forEach((pos, i) => {
    const type = pick(types);
    const w = type === 'boost' ? 2.2 : type === 'bounce' ? 1.6 : type === 'spike' ? 1.4 : rng(1.2, 2.5);
    const d = type === 'boost' ? 1.0 : type === 'bounce' ? 1.6 : type === 'spike' ? 1.4 : rng(0.8, 1.8);
    const h = type === 'teleporter' ? 0.6 : 0.3;
    const sz = levelType === 'void' ? 0.6 : 1;
    const animOffset = Math.random() * Math.PI * 2;
    platforms.push({
      id: `f${floorNum}_p${i}`,
      type,
      x: pos.x,
      z: pos.z,
      baseX: pos.x,
      baseZ: pos.z,
      width: w * sz,
      depth: d * sz,
      height: h,
      rotation: pos.rot,
      floor: floorNum,
      animOffset,
      animSpeed: 0.4 + Math.random() * 0.4,
      animRange: type === 'moving' ? 1.2 : type === 'rotating' ? 0.2 : 0
    });
  });

  return platforms;
}

function generatePlayers(floorCount) {
  const names = ['Dawju9', 'Whitekali', 'ProGamer', 'Climber99', 'TopPlayer'];
  const colors = ['#888888', '#b0b0b0', '#d4d4d4', '#aaaaaa', '#555555'];
  const result = {};
  names.forEach((name, i) => {
    const floor = Math.floor(Math.random() * floorCount) + 1;
    const a = Math.random() * Math.PI * 2;
    const d = 1 + Math.random() * 3.5;
    result[`p_${i}`] = {
      name, floor,
      x: Math.cos(a + i * 1.3) * d,
      z: Math.sin(a + i * 1.3) * d,
      color: colors[i],
      phase: Math.random() * Math.PI * 2
    };
  });
  return result;
}

function buildScene() {
  const floorCount = 30;

  for (let f = 1; f <= floorCount; f++) {
    const type = getLevelType(f);
    floors[f] = {
      level: Math.ceil(f / 10), floor: f,
      type, platforms: generatePlatforms(f, type)
    };
  }

  Object.assign(players, generatePlayers(floorCount));

  rebuildMeshes();
  updateUI();
}

function createFloorLabel(floorNum, type) {
  const div = document.createElement('div');
  div.textContent = `${floorNum}`;
  div.style.color = type.color;
  div.style.fontSize = '11px';
  div.style.fontWeight = 'bold';
  div.style.fontFamily = 'IBM Plex Sans, sans-serif';
  div.style.textShadow = '0 0 10px rgba(0,0,0,0.9)';
  div.style.background = `rgba(0,0,0,0.6)`;
  div.style.padding = '1px 5px';
  div.style.borderRadius = '3px';
  div.style.border = `1px solid ${type.color}44`;
  div.style.minWidth = '18px';
  div.style.textAlign = 'center';
  return new CSS2DObject(div);
}

function rebuildMeshes() {
  floorMeshes.forEach(m => { scene.remove(m); if (m.geometry) m.geometry.dispose(); if (m.material) m.material.dispose(); });
  playerMeshes.forEach(m => { scene.remove(m); if (m.geometry) m.geometry.dispose(); if (m.material) m.material.dispose(); });
  floorMeshes = [];
  playerMeshes = [];
  platformMeshes = [];
  const HS = 5.5;

  // Staircase group at 4 sides connecting all floors
  const stairMat = new THREE.MeshStandardMaterial({ color: 0x333355, roughness: 0.7, metalness: 0.2 });

  Object.keys(floors).forEach(fKey => {
    const f = floors[fKey];
    const fn = parseInt(fKey);
    const yPos = (fn - 1) * floorSpacing;
    const typeInfo = LevelTypes[f.type] || LevelTypes.normal;
    const tColor = new THREE.Color(typeInfo.color);

    // -- City block base (square concrete slab) --
    const baseMat = new THREE.MeshStandardMaterial({
      color: 0x1a1a2e, roughness: 0.85, metalness: 0.1,
      transparent: true, opacity: 0.4
    });
    const base = new THREE.Mesh(new THREE.PlaneGeometry(HS * 2, HS * 2), baseMat);
    base.rotation.x = -Math.PI / 2;
    base.position.set(0, yPos - 0.05, 0);
    base.receiveShadow = true;
    scene.add(base);
    floorMeshes.push(base);

    // -- Street grid overlay --
    const gridMat = new THREE.MeshBasicMaterial({ color: tColor, transparent: true, opacity: 0.06, side: THREE.DoubleSide });
    const grid = new THREE.Mesh(new THREE.PlaneGeometry(HS * 2, HS * 2), gridMat);
    grid.rotation.x = -Math.PI / 2;
    grid.position.set(0, yPos + 0.02, 0);
    scene.add(grid);
    floorMeshes.push(grid);

    // Street lines (cross pattern)
    const lineMat = new THREE.MeshBasicMaterial({ color: tColor, transparent: true, opacity: 0.08 });
    [-2, 0, 2].forEach(offset => {
      const lx = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.01, HS * 2), lineMat);
      lx.position.set(offset, yPos + 0.04, 0);
      scene.add(lx);
      floorMeshes.push(lx);
      const lz = new THREE.Mesh(new THREE.BoxGeometry(HS * 2, 0.01, 0.04), lineMat);
      lz.position.set(0, yPos + 0.04, offset);
      scene.add(lz);
      floorMeshes.push(lz);
    });

    // -- Block edge / curb --
    const curbMat = new THREE.MeshBasicMaterial({ color: 0x444466, transparent: true, opacity: 0.15 });
    for (let side = 0; side < 4; side++) {
      const a = side * Math.PI / 2;
      const curb = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.08, HS * 2), curbMat);
      curb.position.set(Math.cos(a) * HS, yPos + 0.04, Math.sin(a) * HS);
      curb.rotation.y = -a;
      scene.add(curb);
      floorMeshes.push(curb);
    }

    // -- Staircase at each corner connecting to next floor --
    if (fn < Object.keys(floors).length) {
      const corners = [[1,1], [-1,1], [1,-1], [-1,-1]];
      corners.forEach(c => {
        const sx = c[0] * 5.2;
        const sz = c[1] * 5.2;
        for (let s = 0; s < 8; s++) {
          const t = s / 8;
          const step = new THREE.Mesh(
            new THREE.BoxGeometry(0.6, 0.08, 0.35),
            new THREE.MeshStandardMaterial({ color: 0x44446a, roughness: 0.6, metalness: 0.2 })
          );
          step.position.set(
            sx + c[0] * t * 0.35,
            yPos + 0.04 + t * floorSpacing,
            sz + c[1] * t * 0.35
          );
          scene.add(step);
          floorMeshes.push(step);
        }
        // Railing posts
        for (let p = 0; p < 4; p++) {
          const pt = p / 3;
          const post = new THREE.Mesh(
            new THREE.CylinderGeometry(0.02, 0.02, floorSpacing, 4),
            new THREE.MeshBasicMaterial({ color: 0x555588, transparent: true, opacity: 0.2 })
          );
          post.position.set(
            sx + c[0] * (pt * 0.35 + 0.1),
            yPos + floorSpacing / 2,
            sz + c[1] * (pt * 0.35 + 0.1)
          );
          scene.add(post);
          floorMeshes.push(post);
        }
      });
    }

    // -- Building on the block --
    const buildingCount = typeInfo.name === 'The Void' ? 1 : 3 + Math.floor(Math.random() * 3);
    for (let bi = 0; bi < buildingCount; bi++) {
      const bh = 0.4 + Math.random() * 0.8;
      const bw = 0.6 + Math.random() * 0.6;
      const bd = 0.6 + Math.random() * 0.6;
      const bAngle = Math.random() * Math.PI * 2;
      const bDist = 0.5 + Math.random() * 2.5;
      const bx = Math.cos(bAngle + bi * 2.1) * bDist;
      const bz = Math.sin(bAngle + bi * 2.1) * bDist;
      const bColor = 0x222244 + Math.floor(Math.random() * 0x222222);
      const bMat = new THREE.MeshStandardMaterial({
        color: bColor, roughness: 0.7, metalness: 0.1,
        emissive: new THREE.Color(bColor), emissiveIntensity: 0.03
      });
      const bMesh = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bd), bMat);
      bMesh.position.set(bx, yPos + bh / 2, bz);
      bMesh.castShadow = true;
      bMesh.receiveShadow = true;
      scene.add(bMesh);
      floorMeshes.push(bMesh);

      // Windows
      const wMatB = new THREE.MeshBasicMaterial({ color: 0xffdd77, transparent: true, opacity: 0.15 + Math.random() * 0.2 });
      const wc = Math.floor(bh * 4);
      for (let wi = 0; wi < wc; wi++) {
        const wy = -bh / 2 + 0.1 + wi * 0.2;
        [0, 1].forEach(side => {
          const win = new THREE.Mesh(new THREE.PlaneGeometry(0.12, 0.14), wMatB);
          const sd = side === 0 ? bw / 2.05 : bd / 2.05;
          win.position.set(
            side === 0 ? Math.sign(bx || 1) * sd : bx + (Math.random() - 0.5) * bw * 0.4,
            yPos + bh / 2 + wy,
            side === 1 ? Math.sign(bz || 1) * sd : bz + (Math.random() - 0.5) * bd * 0.4
          );
          scene.add(win);
          floorMeshes.push(win);
        });
      }
    }

    // -- Platforms (gameplay elements on this block) --
    f.platforms.forEach(p => {
      const color = PlatformColors[p.type] || PlatformColors.basic;
      const c = hexToRgb(color);
      const isSpecial = p.type === 'teleporter' || p.type === 'boost' || p.type === 'bounce' || p.type === 'spike';
      const emissiveIntensity = isSpecial ? 0.45 : 0.25;

      const geom = p.type === 'bounce'
        ? new THREE.CylinderGeometry(p.width / 2, p.width / 2, p.height * 2, 16)
        : new THREE.BoxGeometry(p.width, p.height, p.depth);

      const mat = new THREE.MeshStandardMaterial({
        color: new THREE.Color(color), roughness: 0.3, metalness: 0.4,
        emissive: new THREE.Color(color), emissiveIntensity
      });
      const mesh = new THREE.Mesh(geom, mat);
      mesh.position.set(p.x, yPos + p.height / 2 + 0.1, p.z);
      mesh.rotation.y = p.rotation || 0;
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.userData = { platform: p, baseIntensity: emissiveIntensity, initialY: yPos + p.height / 2 + 0.1 };
      scene.add(mesh);
      floorMeshes.push(mesh);
      platformMeshes.push(mesh);

      // Wireframe glow edge
      const edgeGeom = new THREE.EdgesGeometry(geom);
      const edgeLine = new THREE.LineSegments(edgeGeom, new THREE.LineBasicMaterial({
        color: new THREE.Color(color), transparent: true, opacity: 0.35
      }));
      edgeLine.position.copy(mesh.position);
      edgeLine.rotation.copy(mesh.rotation);
      scene.add(edgeLine);
      floorMeshes.push(edgeLine);

      // -- Type-specific decorations --
      if (p.type === 'teleporter') {
        const r1 = new THREE.Mesh(new THREE.TorusGeometry(p.width / 2 + 0.15, 0.06, 8, 20),
          new THREE.MeshBasicMaterial({ color: new THREE.Color(color), transparent: true, opacity: 0.7 }));
        r1.position.set(p.x, yPos + 0.2, p.z);
        r1.rotation.x = Math.PI / 2;
        scene.add(r1);
        floorMeshes.push(r1);
        const r2 = new THREE.Mesh(new THREE.TorusGeometry(p.width / 2 + 0.3, 0.1, 8, 20),
          new THREE.MeshBasicMaterial({ color: new THREE.Color(color), transparent: true, opacity: 0.15 }));
        r2.position.copy(r1.position);
        r2.rotation.copy(r1.rotation);
        scene.add(r2);
        floorMeshes.push(r2);
      }
      if (p.type === 'boost') {
        const arrow = new THREE.Mesh(new THREE.BoxGeometry(p.width * 0.7, 0.04, p.depth * 0.25),
          new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 }));
        arrow.position.set(p.x, yPos + 0.2, p.z);
        scene.add(arrow);
        floorMeshes.push(arrow);
      }
      if (p.type === 'spike') {
        for (let s = -p.width / 2 + 0.25; s < p.width / 2; s += 0.5) {
          const cone = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.3, 4),
            new THREE.MeshStandardMaterial({ color: new THREE.Color(color), emissive: new THREE.Color(color), emissiveIntensity: 0.4 }));
          cone.position.set(p.x + s, yPos + 0.35, p.z);
          scene.add(cone);
          floorMeshes.push(cone);
        }
      }
      if (p.type === 'bounce') {
        const ring = new THREE.Mesh(new THREE.TorusGeometry(p.width * 0.35, 0.03, 6, 14),
          new THREE.MeshBasicMaterial({ color: new THREE.Color(color), transparent: true, opacity: 0.5 }));
        ring.position.set(p.x, yPos + 0.2, p.z);
        ring.rotation.x = Math.PI / 2;
        scene.add(ring);
        floorMeshes.push(ring);
      }
    });

    // -- Small street trees --
    const treeMat = new THREE.MeshStandardMaterial({ color: 0x1a3a2a, roughness: 0.9 });
    const trunkMat = new THREE.MeshStandardMaterial({ color: 0x443322, roughness: 0.9 });
    for (let ti = 0; ti < 3; ti++) {
      const ta = Math.random() * Math.PI * 2;
      const td = 3 + Math.random() * 2;
      const tx = Math.cos(ta + fn * 1.3) * td;
      const tz = Math.sin(ta + fn * 1.3) * td;
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.06, 0.2, 4), trunkMat);
      trunk.position.set(tx, yPos + 0.1, tz);
      scene.add(trunk);
      floorMeshes.push(trunk);
      const crown = new THREE.Mesh(new THREE.SphereGeometry(0.18, 5, 5), treeMat);
      crown.position.set(tx, yPos + 0.25, tz);
      scene.add(crown);
      floorMeshes.push(crown);
    }

    // -- Floor label (at block edge) --
    const label = createFloorLabel(fn, typeInfo);
    label.position.set(HS + 0.3, yPos + 0.5, 0);
    scene.add(label);
    floorMeshes.push(label);
  });

  // ---- PLAYERS ----
  Object.values(players).forEach(player => {
    const yPos = (player.floor - 1) * floorSpacing + 0.5;
    const sphereGeom = new THREE.SphereGeometry(0.4, 14, 14);
    const sphereMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(player.color), emissive: new THREE.Color(player.color),
      emissiveIntensity: 0.5, roughness: 0.2, metalness: 0.3
    });
    const sphere = new THREE.Mesh(sphereGeom, sphereMat);
    sphere.position.set(player.x, yPos, player.z);
    sphere.castShadow = true;
    sphere.userData = { player: true, id: player.name };
    scene.add(sphere);
    playerMeshes.push(sphere);

    [0.75, 1.05].forEach((r, i) => {
      const g = new THREE.Mesh(new THREE.SphereGeometry(r, 10, 10),
        new THREE.MeshBasicMaterial({ color: new THREE.Color(player.color), transparent: true, opacity: i === 0 ? 0.15 : 0.05 }));
      g.position.copy(sphere.position);
      scene.add(g);
      playerMeshes.push(g);
    });

    const ld = document.createElement('div');
    ld.textContent = player.name;
    ld.style.cssText = `color:var(--text-heading);font-size:10px;font-weight:600;font-family:IBM Plex Sans,sans-serif;text-shadow:0 0 8px ${player.color},0 0 20px rgba(0,0,0,0.9);background:rgba(0,0,0,0.5);padding:1px 6px;border-radius:4px;border:1px solid ${player.color}66;white-space:nowrap;`;
    const label = new CSS2DObject(ld);
    label.position.set(player.x, yPos + 0.9, player.z);
    scene.add(label);
    playerMeshes.push(label);
  });

  // ---- STARS ----
  [...scene.children].filter(c => c.isPoints && c.userData.isStar).forEach(c => scene.remove(c));
  const starGeom = new THREE.BufferGeometry();
  const starPos = new Float32Array(600);
  for (let i = 0; i < 600; i++) starPos[i] = (Math.random() - 0.5) * 200;
  starGeom.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
  const stars = new THREE.Points(starGeom, new THREE.PointsMaterial({ color: 0xffffff, size: 0.12, transparent: true, opacity: 0.5 }));
  stars.position.y = -5;
  stars.userData = { isStar: true };
  scene.add(stars);
  floorMeshes.push(stars);
}

function updateUI() {
  document.getElementById('floorCount').textContent = Object.keys(floors).length;
  document.getElementById('playerCount').textContent = Object.keys(players).length;

  const floorList = document.getElementById('floorList');
  floorList.innerHTML = '';
  Object.keys(floors).forEach(fKey => {
    const f = floors[fKey];
    const typeInfo = LevelTypes[f.type] || LevelTypes.normal;
    const isSpecial = f.type !== 'normal';
    const item = document.createElement('div');
    item.className = `floor-item${isSpecial ? ' special-floor' : ''}`;
    item.style.borderLeft = isSpecial ? `3px solid ${typeInfo.color}` : '';
    item.innerHTML = `
      <span>Floor ${fKey}</span>
      <span class="floor-type" style="background: ${typeInfo.color}22; color: ${typeInfo.color}">${typeInfo.name}</span>
    `;
    item.addEventListener('click', () => focusFloor(parseInt(fKey)));
    floorList.appendChild(item);
  });

  const legend = document.getElementById('legend');
  legend.innerHTML = '';
  Object.entries(PlatformColors).filter(([k]) => k !== 'platform' && k !== 'special' && k !== 'elevator').forEach(([type, color]) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-color" style="background: ${color}"></div> ${type.charAt(0).toUpperCase() + type.slice(1)}`;
    legend.appendChild(item);
  });

  updatePlayerList();
}

function updatePlayerList() {
  const container = document.getElementById('playerList');
  container.innerHTML = '';
  Object.values(players).forEach(p => {
    const item = document.createElement('div');
    item.className = 'player-item';
    item.innerHTML = `
      <div class="player-dot" style="background: ${p.color}"></div>
      <span>${p.name}</span>
      <span style="color: var(--text-dim); font-size: 0.8em;">F${p.floor}</span>
    `;
    container.appendChild(item);
  });
}

document.getElementById('floorSearch').addEventListener('input', (e) => {
  const val = e.target.value.trim();
  const items = document.querySelectorAll('.floor-item');
  items.forEach(item => {
    const match = !val || item.textContent.includes(val);
    item.style.display = match ? '' : 'none';
  });
});

document.getElementById('floorSearch').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const val = e.target.value.trim();
    const num = parseInt(val);
    if (num && floors[num]) focusFloor(num);
    else {
      const items = document.querySelectorAll('.floor-item');
      for (const item of items) {
        if (item.style.display !== 'none') { item.click(); break; }
      }
    }
  }
});

function focusFloor(floorNum) {
  currentViewFloor = floorNum;
  const y = (floorNum - 1) * floorSpacing;
  const typeInfo = LevelTypes[floors[floorNum].type] || LevelTypes.normal;

  const targetPos = new THREE.Vector3(0, y, 0);
  const start = controls.target.clone();
  const duration = 400;
  const startTime = performance.now();

  function animateFocus(now) {
    const t = Math.min((now - startTime) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    controls.target.lerpVectors(start, targetPos, ease);
    if (t < 1) requestAnimationFrame(animateFocus);
  }
  animateFocus(performance.now());

  document.getElementById('info-overlay').textContent =
    `Floor ${floorNum} - ${typeInfo.name} • Drag to orbit, scroll to zoom`;

  document.querySelectorAll('.floor-item').forEach((el, i) => {
    el.classList.toggle('active', i + 1 === floorNum);
  });

  const baseColor = typeInfo.color || LevelTypes.normal.color;
  const c = new THREE.Color(baseColor);
  ambientLight.color.lerp(c, 0.3);
  scene.background = new THREE.Color(baseColor).multiplyScalar(0.08);
  fillLight.color.setHSL(c.getHSL({}).h, 0.6, 0.5);
  const dark = new THREE.Color(baseColor).multiplyScalar(0.3);
  hemiLight.groundColor.lerp(dark, 0.5);
}

document.getElementById('resetView').addEventListener('click', () => {
  autoRotate = false;
  camera.position.set(35, 75, 35);
  controls.target.set(0, 70, 0);
  controls.update();
});

document.getElementById('toggleRotate').addEventListener('click', () => {
  autoRotate = !autoRotate;
  document.getElementById('toggleRotate').classList.toggle('active', autoRotate);
});

document.getElementById('topView').addEventListener('click', () => {
  const y = (currentViewFloor - 1) * floorSpacing;
  camera.position.set(0, y + 25, 0.01);
  controls.target.set(0, y, 0);
  controls.update();
});

// ---- ANIMATION LOOP ----
function animate() {
  requestAnimationFrame(animate);

  const time = performance.now() * 0.001;

  if (autoRotate) {
    const pivot = controls.target;
    const radius = camera.position.distanceTo(pivot);
    const angle = time * 0.15;
    camera.position.x = pivot.x + radius * Math.sin(angle);
    camera.position.z = pivot.z + radius * Math.cos(angle);
    camera.position.y = pivot.y + 25;
    camera.lookAt(pivot);
  }

  particles.rotation.y = time * 0.01;
  const pos = particles.geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    pos[i * 3 + 1] -= 0.02;
    if (pos[i * 3 + 1] < -5) pos[i * 3 + 1] = 170;
  }
  particles.geometry.attributes.position.needsUpdate = true;

  platformMeshes.forEach(mesh => {
    const p = mesh.userData.platform;
    if (!p) return;
    if (p.type === 'moving') {
      const dx = Math.sin(time * p.animSpeed + p.animOffset) * p.animRange;
      const dz = Math.cos(time * p.animSpeed + p.animOffset) * p.animRange;
      mesh.position.x = p.baseX + dx;
      mesh.position.z = p.baseZ + dz;
    }
    if (p.type === 'rotating') {
      mesh.rotation.y = p.rotation + time * 0.5;
    }
    if (p.type === 'bounce') {
      const bounce = Math.abs(Math.sin(time * 1.5 + p.animOffset)) * 0.15;
      mesh.position.y = mesh.userData.initialY + bounce;
      mesh.scale.y = 1 - bounce * 1.5;
    }
    if (p.type === 'teleporter') {
      mesh.rotation.y = time * 0.8;
    }
  });

  Object.values(players).forEach((player, i) => {
    const yPos = (player.floor - 1) * floorSpacing + 0.5;
    const dx = Math.sin(time * 0.5 + player.phase) * 0.5;
    const dz = Math.cos(time * 0.7 + player.phase) * 0.5;
    const meshIdx = i * 4;
    for (let j = 0; j < 4; j++) {
      if (playerMeshes[meshIdx + j]) {
        playerMeshes[meshIdx + j].position.x = player.x + dx;
        playerMeshes[meshIdx + j].position.z = player.z + dz;
      }
    }
  });

  titleLabel.position.y = 160 + Math.sin(time * 0.3) * 0.3;
  subtitleLabel.position.y = 155 + Math.sin(time * 0.3 + 0.5) * 0.2;

  bloomPass.strength = 0.3 + Math.sin(time * 0.1) * 0.05;

  updateHover();
  controls.update();
  composer.render();
  labelRenderer.render(scene, camera);
}

// ---- RESIZE ----
window.addEventListener('resize', () => {
  const w = container.clientWidth;
  const h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  labelRenderer.setSize(w, h);
  composer.setSize(w, h);
});

// ---- INIT ----
buildScene();

setTimeout(() => {
  document.getElementById('loadingOverlay').style.display = 'none';
}, 1000);

animate();
</script>
</body>
