---
layout: default
title: MiastoX - 3D Map Viewer
desc: Interactive 3D map viewer for MiastoX game
url: /map-3d.html
---
<style>
:root {
  --accent: #e94560;
  --bg-dark: #0f0f23;
  --bg-panel: #1a1a2e;
  --text: #ffffff;
  --text-dim: #888;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg-dark);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
}

.map-container {
  display: flex;
  height: 100vh;
  gap: 0;
}

.map-sidebar {
  width: 300px;
  min-width: 300px;
  background: var(--bg-panel);
  padding: 20px;
  overflow-y: auto;
  border-right: 1px solid rgba(255,255,255,0.1);
  z-index: 10;
}

.sidebar-title {
  font-family: 'Big Shoulders Display', sans-serif;
  font-size: 1.6em;
  margin-bottom: 15px;
  color: var(--accent);
  text-transform: uppercase;
}

.connection-status {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 15px;
  background: rgba(255,255,255,0.05);
}

.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #00ff88;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

.stat-box {
  background: rgba(255,255,255,0.05);
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 10px;
}

.stat-label {
  font-size: 0.8em;
  color: var(--text-dim);
}

.stat-value {
  font-size: 1.5em;
  font-weight: bold;
}

.floor-section, .legend-section, .players-section {
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.1);
}

.section-title {
  font-size: 0.9em;
  color: var(--text-dim);
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.floor-list {
  max-height: 250px;
  overflow-y: auto;
}

.floor-item {
  padding: 8px 12px;
  margin: 4px 0;
  background: rgba(255,255,255,0.05);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.85em;
}

.floor-item:hover {
  background: rgba(233, 69, 96, 0.15);
}

.floor-item.active {
  background: var(--accent);
}

.floor-type {
  font-size: 0.7em;
  padding: 2px 6px;
  border-radius: 4px;
  background: rgba(255,255,255,0.1);
}

.view-btn {
  font-size: 0.7em;
  padding: 2px 8px;
  border: none;
  border-radius: 4px;
  background: rgba(255,255,255,0.15);
  color: white;
  cursor: pointer;
  transition: all 0.2s;
}

.view-btn:hover {
  background: var(--accent);
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 4px 0;
  font-size: 0.8em;
}

.legend-color {
  width: 14px;
  height: 14px;
  border-radius: 3px;
}

.player-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 8px;
  background: rgba(255,255,255,0.05);
  border-radius: 6px;
  margin: 4px 0;
  font-size: 0.85em;
}

.player-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

#canvas-container {
  flex: 1;
  position: relative;
  overflow: hidden;
}

#info-overlay {
  position: absolute;
  bottom: 20px;
  left: 20px;
  background: rgba(0,0,0,0.7);
  padding: 10px 16px;
  border-radius: 8px;
  font-size: 0.85em;
  pointer-events: none;
}

.controls-overlay {
  position: absolute;
  top: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.ctrl-btn {
  width: 40px;
  height: 40px;
  border-radius: 8px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
  font-size: 1.2em;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.ctrl-btn:hover {
  background: var(--accent);
}

.loading-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 15px;
  z-index: 20;
}

.spinner {
  width: 50px;
  height: 50px;
  border: 4px solid rgba(255,255,255,0.1);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.floor-list::-webkit-scrollbar, .map-sidebar::-webkit-scrollbar {
  width: 6px;
}
.floor-list::-webkit-scrollbar-track, .map-sidebar::-webkit-scrollbar-track {
  background: transparent;
}
.floor-list::-webkit-scrollbar-thumb, .map-sidebar::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.15);
  border-radius: 3px;
}

@media (max-width: 768px) {
  .map-sidebar {
    width: 100%;
    min-width: 100%;
    max-height: 40vh;
    border-right: none;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .map-container {
    flex-direction: column;
  }
}
</style>

<div class="map-container">
  <div class="map-sidebar">
    <div class="sidebar-title">🗺️ MiastoX 3D</div>

    <div class="connection-status">
      <div class="status-dot"></div>
      <span>Demo Mode</span>
    </div>

    <div class="stat-box">
      <div class="stat-label">Floors Loaded</div>
      <div class="stat-value" id="floorCount">30</div>
    </div>

    <div class="stat-box">
      <div class="stat-label">Players Online</div>
      <div class="stat-value" id="playerCount">5</div>
    </div>

    <div class="floor-section">
      <div class="section-title">Floors</div>
      <div class="floor-list" id="floorList"></div>
    </div>

    <div class="legend-section">
      <div class="section-title">Platform Types</div>
      <div id="legend"></div>
    </div>

    <div class="players-section">
      <div class="section-title">Active Players</div>
      <div id="playerList"></div>
    </div>
  </div>

  <div id="canvas-container">
    <div class="controls-overlay">
      <button class="ctrl-btn" id="resetView" title="Reset View">⟲</button>
      <button class="ctrl-btn" id="toggleRotate" title="Auto Rotate">↻</button>
      <button class="ctrl-btn" id="topView" title="Top View">⬇</button>
    </div>
    <div id="info-overlay">Floor 1 - Normal • Drag to orbit, scroll to zoom</div>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <div>Loading 3D map...</div>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

const PlatformColors = {
  basic: '#00b4d8', platform: '#00b4d8',
  moving: '#ff6b6b', rotating: '#ffd93d',
  spiral: '#6bcb77', checkpoint: '#9d4edd',
  elevator: '#00b4d8', special: '#ff9500',
  boost: '#ff9500', bounce: '#00ff88',
  spike: '#ff006e', ice: '#a0e7e5',
  crumbling: '#8b4513', disappearing: '#666666',
  teleporter: '#8b5cf6', laser: '#ff0000', enemy: '#ff4444'
};

const LevelTypes = {
  normal: { name: 'Normal', color: '#00b4d8' },
  infinite: { name: 'Infinite Spiral', color: '#ffd93d' },
  paradox: { name: 'Paradox', color: '#9d4edd' },
  time_loop: { name: 'Time Loop', color: '#00ffff' },
  mirror: { name: 'Mirror', color: '#c0c0c0' },
  void: { name: 'The Void', color: '#ff0000' },
  disaster: { name: 'Disaster', color: '#ff6b6b' }
};

const floorSpacing = 5;
const platformScale = 0.8;

// ---- SCENE SETUP ----
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f0f23);

const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
camera.position.set(25, 20, 30);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(container.clientWidth, container.clientHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.left = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
container.appendChild(labelRenderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 10;
controls.maxDistance = 100;
controls.maxPolarAngle = Math.PI / 2.1;
controls.target.set(0, 15, 0);

// ---- LIGHTS ----
const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
scene.add(ambientLight);

const mainLight = new THREE.DirectionalLight(0xffeedd, 2);
mainLight.position.set(20, 40, 20);
mainLight.castShadow = true;
mainLight.shadow.mapSize.width = 2048;
mainLight.shadow.mapSize.height = 2048;
scene.add(mainLight);

const fillLight = new THREE.DirectionalLight(0x4488ff, 0.5);
fillLight.position.set(-20, 10, -20);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xff66aa, 0.3);
rimLight.position.set(0, -10, 30);
scene.add(rimLight);

const hemiLight = new THREE.HemisphereLight(0x4488ff, 0x002244, 0.4);
scene.add(hemiLight);

// ---- FLOOR DATA ----
const floors = {};
const players = {};
let floorMeshes = [];
let playerMeshes = [];
let currentViewFloor = 1;

function getLevelType(floor) {
  if (floor % 100 === 0) return 'void';
  if (floor % 75 === 0) return 'paradox';
  if (floor % 50 === 0) return 'time_loop';
  if (floor % 33 === 0) return 'mirror';
  if (floor >= 15 && floor % 10 === 0) return 'infinite';
  if (floor >= 50 && floor % 10 === 0) return 'disaster';
  return 'normal';
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16) / 255;
  const g = parseInt(hex.slice(3, 5), 16) / 255;
  const b = parseInt(hex.slice(5, 7), 16) / 255;
  return { r, g, b };
}

function generatePlatforms(floorNum, levelType) {
  const platforms = [];
  const count = floorNum < 20 ? 6 : 10;
  const radiusMin = 4 + (floorNum % 5) * 0.3;
  const radiusMax = 8 + (floorNum % 5) * 0.3;

  const types = levelType === 'infinite' ? ['spiral', 'moving'] :
    levelType === 'paradox' ? ['checkpoint', 'teleporter'] :
    levelType === 'mirror' ? ['basic', 'ice'] :
    levelType === 'void' ? ['basic', 'spike'] :
    ['basic', 'platform', 'moving', 'rotating', 'spiral', 'checkpoint', 'boost', 'bounce', 'spike'];

  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2 + (floorNum * 0.15);
    const radius = radiusMin + Math.random() * (radiusMax - radiusMin);
    const type = types[Math.floor(Math.random() * types.length)];

    let w = 2 + Math.random() * 1.5;
    let h = 0.3;
    let d = 1 + Math.random() * 1;

    if (type === 'boost') { w = 2.5; d = 1.2; }
    if (type === 'bounce') { w = 1.8; d = 1.8; }
    if (type === 'spike') { w = 1.5; d = 1.5; }

    if (levelType === 'void') {
      w *= 0.6;
      d *= 0.6;
    }

    platforms.push({
      id: `f${floorNum}_p${i}`,
      type,
      x: Math.cos(angle) * radius,
      z: Math.sin(angle) * radius,
      width: w,
      depth: d,
      height: h,
      rotation: angle,
      floor: floorNum
    });
  }

  if (levelType === 'infinite') {
    for (let i = 0; i < 3; i++) {
      const a = (i / 3) * Math.PI * 2 + 0.3;
      platforms.push({
        id: `f${floorNum}_s${i}`,
        type: 'spiral',
        x: Math.cos(a) * (radiusMax + 2 + i * 1.5),
        z: Math.sin(a) * (radiusMax + 2 + i * 1.5),
        width: 1.5, depth: 1.5, height: 0.3,
        rotation: a, floor: floorNum, isExtra: true
      });
    }
  }

  return platforms;
}

function generatePlayers(floorCount) {
  const names = ['Dawju9', 'Whitekali', 'ProGamer', 'Climber99', 'TopPlayer'];
  const colors = ['#00ff88', '#ff6b6b', '#ffd93d', '#00b4d8', '#9d4edd'];
  const result = {};
  names.forEach((name, i) => {
    const floor = Math.floor(Math.random() * floorCount) + 1;
    const angle = Math.random() * Math.PI * 2;
    const radius = 3 + Math.random() * 4;
    result[`p_${i}`] = {
      name, floor,
      x: Math.cos(angle) * radius,
      z: Math.sin(angle) * radius,
      color: colors[i],
      angle: angle, radius: radius, phase: Math.random() * Math.PI * 2
    };
  });
  return result;
}

function buildScene() {
  const floorCount = 30;

  for (let f = 1; f <= floorCount; f++) {
    const type = getLevelType(f);
    floors[f] = {
      level: Math.ceil(f / 10), floor: f,
      type, platforms: generatePlatforms(f, type)
    };
  }

  Object.assign(players, generatePlayers(floorCount));

  rebuildMeshes();
  updateUI();
}

function createFloorLabel(floorNum, type) {
  const div = document.createElement('div');
  div.textContent = `F${floorNum}`;
  div.style.color = type.color;
  div.style.fontSize = '12px';
  div.style.fontWeight = 'bold';
  div.style.fontFamily = 'IBM Plex Sans, sans-serif';
  div.style.textShadow = '0 0 10px rgba(0,0,0,0.8)';
  div.style.background = 'rgba(0,0,0,0.5)';
  div.style.padding = '2px 6px';
  div.style.borderRadius = '4px';
  div.style.border = `1px solid ${type.color}44`;
  return new CSS2DObject(div);
}

function rebuildMeshes() {
  floorMeshes.forEach(m => { scene.remove(m); if (m.geometry) m.geometry.dispose(); if (m.material) m.material.dispose(); });
  playerMeshes.forEach(m => { scene.remove(m); if (m.geometry) m.geometry.dispose(); if (m.material) m.material.dispose(); });
  floorMeshes = [];
  playerMeshes = [];

  const floorGeom = new THREE.PlaneGeometry(18, 18);
  const floorMat = new THREE.MeshStandardMaterial({
    color: 0x1a1a2e,
    transparent: true,
    opacity: 0.3,
    side: THREE.DoubleSide,
    roughness: 0.8,
    metalness: 0.2
  });

  Object.keys(floors).forEach(fKey => {
    const f = floors[fKey];
    const fn = parseInt(fKey);
    const yPos = (fn - 1) * floorSpacing;
    const typeInfo = LevelTypes[f.type] || LevelTypes.normal;

    const platformMesh = new THREE.Mesh(floorGeom, floorMat.clone());
    platformMesh.position.set(0, yPos - 0.1, 0);
    platformMesh.rotation.x = -Math.PI / 2;
    platformMesh.receiveShadow = true;
    scene.add(platformMesh);
    floorMeshes.push(platformMesh);

    const ringGeom = new THREE.RingGeometry(8.5, 9, 48);
    const ringMat = new THREE.MeshBasicMaterial({
      color: new THREE.Color(typeInfo.color),
      transparent: true,
      opacity: 0.2,
      side: THREE.DoubleSide
    });
    const ring = new THREE.Mesh(ringGeom, ringMat);
    ring.position.set(0, yPos + 0.05, 0);
    ring.rotation.x = -Math.PI / 2;
    scene.add(ring);
    floorMeshes.push(ring);

    const columns = 24;
    for (let i = 0; i < columns; i++) {
      const a = (i / columns) * Math.PI * 2;
      const pillarGeom = new THREE.CylinderGeometry(0.05, 0.05, yPos, 4);
      const pillarMat = new THREE.MeshBasicMaterial({
        color: new THREE.Color(typeInfo.color),
        transparent: true,
        opacity: 0.1
      });
      const pillar = new THREE.Mesh(pillarGeom, pillarMat);
      pillar.position.set(Math.cos(a) * 9, yPos / 2, Math.sin(a) * 9);
      scene.add(pillar);
      floorMeshes.push(pillar);
    }

    f.platforms.forEach(p => {
      const color = PlatformColors[p.type] || PlatformColors.basic;
      const c = hexToRgb(color);

      const geom = p.type === 'bounce'
        ? new THREE.CylinderGeometry(p.width / 2, p.width / 2, p.height * 2, 16)
        : new THREE.BoxGeometry(p.width, p.height, p.depth);

      const mat = new THREE.MeshStandardMaterial({
        color: new THREE.Color(color),
        roughness: 0.4,
        metalness: 0.3,
        emissive: new THREE.Color(color),
        emissiveIntensity: 0.15
      });

      const mesh = new THREE.Mesh(geom, mat);
      mesh.position.set(p.x, yPos + p.height / 2, p.z);
      mesh.rotation.y = p.rotation || 0;
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.userData = { platform: p };
      scene.add(mesh);
      floorMeshes.push(mesh);

      if (p.type === 'teleporter') {
        const ringGeom2 = new THREE.TorusGeometry(p.width / 2 + 0.1, 0.08, 8, 16);
        const ringMat2 = new THREE.MeshBasicMaterial({ color: new THREE.Color(color) });
        const ring2 = new THREE.Mesh(ringGeom2, ringMat2);
        ring2.position.set(p.x, yPos + p.height + 0.05, p.z);
        ring2.rotation.x = Math.PI / 2;
        scene.add(ring2);
        floorMeshes.push(ring2);
      }

      if (p.type === 'boost') {
        const stripGeom = new THREE.BoxGeometry(p.width * 0.8, 0.05, p.depth * 0.3);
        const stripMat = new THREE.MeshBasicMaterial({
          color: 0xffffff,
          transparent: true,
          opacity: 0.5
        });
        const strip = new THREE.Mesh(stripGeom, stripMat);
        strip.position.set(p.x, yPos + p.height + 0.05, p.z);
        scene.add(strip);
        floorMeshes.push(strip);
      }

      if (p.type === 'spike') {
        for (let s = -p.width / 2 + 0.3; s < p.width / 2; s += 0.6) {
          const spikeGeom = new THREE.ConeGeometry(0.15, 0.4, 4);
          const spikeMat = new THREE.MeshStandardMaterial({
            color: new THREE.Color(color),
            emissive: new THREE.Color(color),
            emissiveIntensity: 0.2
          });
          const spike = new THREE.Mesh(spikeGeom, spikeMat);
          spike.position.set(p.x + s, yPos + p.height + 0.2, p.z);
          scene.add(spike);
          floorMeshes.push(spike);
        }
      }
    });

    const label = createFloorLabel(fn, typeInfo);
    label.position.set(0, yPos + 0.5, 9.5);
    scene.add(label);
    floorMeshes.push(label);
  });

  Object.values(players).forEach(player => {
    const yPos = (player.floor - 1) * floorSpacing + 0.5;
    const c = hexToRgb(player.color);

    const sphereGeom = new THREE.SphereGeometry(0.5, 16, 16);
    const sphereMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(player.color),
      emissive: new THREE.Color(player.color),
      emissiveIntensity: 0.3,
      roughness: 0.3,
      metalness: 0.1
    });
    const sphere = new THREE.Mesh(sphereGeom, sphereMat);
    sphere.position.set(player.x, yPos, player.z);
    sphere.castShadow = true;
    sphere.userData = { player: true, id: player.name };
    scene.add(sphere);
    playerMeshes.push(sphere);

    const glowGeom = new THREE.SphereGeometry(0.7, 12, 12);
    const glowMat = new THREE.MeshBasicMaterial({
      color: new THREE.Color(player.color),
      transparent: true,
      opacity: 0.2
    });
    const glow = new THREE.Mesh(glowGeom, glowMat);
    glow.position.copy(sphere.position);
    scene.add(glow);
    playerMeshes.push(glow);

    const labelDiv = document.createElement('div');
    labelDiv.textContent = player.name;
    labelDiv.style.color = player.color;
    labelDiv.style.fontSize = '11px';
    labelDiv.style.fontWeight = 'bold';
    labelDiv.style.fontFamily = 'IBM Plex Sans, sans-serif';
    labelDiv.style.textShadow = '0 0 8px rgba(0,0,0,0.9)';
    labelDiv.style.background = 'rgba(0,0,0,0.5)';
    labelDiv.style.padding = '1px 6px';
    labelDiv.style.borderRadius = '4px';
    labelDiv.style.border = `1px solid ${player.color}44`;
    labelDiv.style.whiteSpace = 'nowrap';
    const label = new CSS2DObject(labelDiv);
    label.position.set(player.x, yPos + 0.9, player.z);
    scene.add(label);
    playerMeshes.push(label);
  });

  // Stars background
  [...scene.children].filter(c => c.isMesh && c.userData.isStar).forEach(c => scene.remove(c));
  const starGeom = new THREE.BufferGeometry();
  const starCount = 200;
  const starPos = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount * 3; i++) {
    starPos[i] = (Math.random() - 0.5) * 200;
  }
  starGeom.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
  const starMat = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.15,
    transparent: true,
    opacity: 0.6
  });
  const stars = new THREE.Points(starGeom, starMat);
  stars.position.y = -5;
  stars.userData = { isStar: true };
  scene.add(stars);
  floorMeshes.push(stars);
}

function updateUI() {
  document.getElementById('floorCount').textContent = Object.keys(floors).length;
  document.getElementById('playerCount').textContent = Object.keys(players).length;

  const floorList = document.getElementById('floorList');
  floorList.innerHTML = '';
  Object.keys(floors).forEach(fKey => {
    const f = floors[fKey];
    const typeInfo = LevelTypes[f.type] || LevelTypes.normal;
    const item = document.createElement('div');
    item.className = 'floor-item';
    item.innerHTML = `
      <span>Floor ${fKey}</span>
      <span class="floor-type" style="background: ${typeInfo.color}22; color: ${typeInfo.color}">${typeInfo.name}</span>
    `;
    item.addEventListener('click', () => focusFloor(parseInt(fKey)));
    floorList.appendChild(item);
  });

  const legend = document.getElementById('legend');
  legend.innerHTML = '';
  Object.entries(PlatformColors).filter(([k]) => k !== 'platform' && k !== 'special' && k !== 'elevator').forEach(([type, color]) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-color" style="background: ${color}"></div> ${type.charAt(0).toUpperCase() + type.slice(1)}`;
    legend.appendChild(item);
  });

  updatePlayerList();
}

function updatePlayerList() {
  const container = document.getElementById('playerList');
  container.innerHTML = '';
  Object.values(players).forEach(p => {
    const item = document.createElement('div');
    item.className = 'player-item';
    item.innerHTML = `
      <div class="player-dot" style="background: ${p.color}"></div>
      <span>${p.name}</span>
      <span style="color: #666; font-size: 0.8em;">F${p.floor}</span>
    `;
    container.appendChild(item);
  });
}

function focusFloor(floorNum) {
  currentViewFloor = floorNum;
  const y = (floorNum - 1) * floorSpacing;
  controls.target.lerp(new THREE.Vector3(0, y, 0), 0.5);
  const typeInfo = LevelTypes[floors[floorNum].type] || LevelTypes.normal;
  document.getElementById('info-overlay').textContent =
    `Floor ${floorNum} - ${typeInfo.name} • Drag to orbit, scroll to zoom`;

  document.querySelectorAll('.floor-item').forEach((el, i) => {
    el.classList.toggle('active', i + 1 === floorNum);
  });
}

let autoRotate = false;

document.getElementById('resetView').addEventListener('click', () => {
  autoRotate = false;
  camera.position.set(25, 20, 30);
  controls.target.set(0, 15, 0);
  controls.update();
});

document.getElementById('toggleRotate').addEventListener('click', () => {
  autoRotate = !autoRotate;
  document.getElementById('toggleRotate').style.background = autoRotate ? 'var(--accent)' : '';
});

document.getElementById('topView').addEventListener('click', () => {
  const y = (currentViewFloor - 1) * floorSpacing;
  camera.position.set(0, y + 25, 0.01);
  controls.target.set(0, y, 0);
  controls.update();
});

// ---- ANIMATION LOOP ----
function animate() {
  requestAnimationFrame(animate);

  if (autoRotate) {
    const pivot = controls.target;
    const radius = camera.position.distanceTo(pivot);
    const angle = performance.now() * 0.0003;
    camera.position.x = pivot.x + radius * Math.sin(angle);
    camera.position.z = pivot.z + radius * Math.cos(angle);
    camera.position.y = pivot.y + 10;
    camera.lookAt(pivot);
  }

  const time = performance.now() * 0.001;
  Object.values(players).forEach((player, i) => {
    const yPos = (player.floor - 1) * floorSpacing + 0.5;
    const dx = Math.sin(time * 0.5 + player.phase) * 0.5;
    const dz = Math.cos(time * 0.7 + player.phase) * 0.5;
    const meshIdx = i * 3;
    if (playerMeshes[meshIdx]) {
      playerMeshes[meshIdx].position.x = player.x + dx;
      playerMeshes[meshIdx].position.z = player.z + dz;
    }
    if (playerMeshes[meshIdx + 1]) {
      playerMeshes[meshIdx + 1].position.x = player.x + dx;
      playerMeshes[meshIdx + 1].position.z = player.z + dz;
    }
    if (playerMeshes[meshIdx + 2]) {
      playerMeshes[meshIdx + 2].position.x = player.x + dx;
      playerMeshes[meshIdx + 2].position.z = player.z + dz;
    }
  });

  controls.update();
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}

// ---- RESIZE ----
window.addEventListener('resize', () => {
  const w = container.clientWidth;
  const h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  labelRenderer.setSize(w, h);
});

// ---- INIT ----
buildScene();

setTimeout(() => {
  document.getElementById('loadingOverlay').style.display = 'none';
}, 1000);

animate();
</script>
